<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find a Charger | ChargeMitra India</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
        #map { height: 100%; width: 100%; z-index: 1; background: #020617; }
        
        .glass {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Custom Map Marker Style */
        .custom-pin {
            width: 34px;
            height: 34px;
            border-radius: 50% 50% 50% 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: rotate(-45deg);
            border: 2px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .custom-pin i {
            transform: rotate(45deg);
            font-size: 14px;
        }

        /* Pulsing effect for SRMU HQ */
        .hq-pulse {
            position: relative;
        }
        .hq-pulse::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50% 50% 50% 0;
            background: inherit;
            animation: pulse 2s infinite;
            z-index: -1;
        }

        @keyframes pulse {
            0% { transform: rotate(-45deg) scale(1); opacity: 1; }
            100% { transform: rotate(-45deg) scale(2.5); opacity: 0; }
        }

        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-slate-950 text-white" x-data="mapApp()">

    <nav class="fixed w-full z-[100] glass py-4 px-6 flex justify-between items-center border-b border-white/10">
        <div class="flex items-center gap-2">
            <i class="fas fa-bolt text-green-500 text-xl"></i>
            <span class="font-bold text-2xl tracking-tight text-white">Charge<span class="text-green-500">Mitra</span></span>
            <span class="ml-2 text-[10px] bg-white/10 px-2 py-1 rounded text-slate-400 font-bold uppercase tracking-widest">Finder</span>
        </div>
        <div class="flex gap-4">
            <button @click="locateMe()" class="hidden md:flex bg-white/5 hover:bg-white/10 text-white px-4 py-2 rounded-xl text-xs font-bold transition items-center gap-2 border border-white/10">
                <i class="fas fa-crosshairs text-green-500"></i> My Location
            </button>
            <a href="/evp2p/index.html" class="bg-green-600 text-slate-950 px-5 py-2 rounded-xl text-xs font-black hover:bg-green-400 transition flex items-center">
                EXIT
            </a>
        </div>
    </nav>

    <main class="flex h-screen pt-[73px]">
        <aside class="w-full lg:w-[400px] bg-slate-900 z-[90] border-r border-white/10 flex flex-col shadow-2xl relative">
            <div class="p-6 bg-slate-950/50 border-b border-white/10">
                <div class="relative">
                    <input type="text" placeholder="Search Lucknow..." class="w-full bg-slate-900 border border-white/10 rounded-xl py-3 pl-10 pr-4 text-sm focus:border-green-500 outline-none transition">
                    <i class="fas fa-search absolute left-3.5 top-3.5 text-slate-500"></i>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar">
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-2 mb-2">Verified Peer Nodes</p>
                
                <template x-for="charger in chargers" :key="charger.id">
                    <div @click="zoomTo(charger)" 
                         :class="selectedCharger?.id === charger.id ? 'border-green-500 bg-green-500/5' : 'border-white/5 bg-white/5'"
                         class="p-5 rounded-2xl border cursor-pointer hover:border-green-500/30 transition-all duration-300 group">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="font-bold text-slate-100 group-hover:text-green-400 transition" x-text="charger.name"></h3>
                                <p class="text-[11px] text-slate-500 mt-1">
                                    <i class="fas fa-bolt text-green-500 mr-1"></i> <span x-text="charger.type"></span> • <span x-text="charger.dist"></span>
                                </p>
                            </div>
                            <span class="text-xs font-black text-green-500" x-text="charger.price"></span>
                        </div>
                    </div>
                </template>
            </div>
        </aside>

        <section class="flex-1 relative">
            <div id="map"></div>
            
            <div class="absolute top-6 right-6 z-10 glass px-4 py-2 rounded-full border border-green-500/30">
                <span class="flex items-center gap-2 text-[10px] font-bold text-green-500">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-ping"></span>
                    LIVE P2P NETWORK
                </span>
            </div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        function mapApp() {
            return {
                map: null,
                selectedCharger: null,
                chargers: [
                    { 
                        id: 1, 
                        name: 'SRMU Campus Node (HQ)', 
                        coords: [26.9516, 81.0981], 
                        type: 'Type 2 (AC)', 
                        price: '₹10/u', 
                        dist: 'Developing Node',
                        isHQ: true 
                    },
                    { id: 2, name: 'Gomti Nagar Mitra', coords: [26.8467, 80.9462], type: 'Type 2', price: '₹12/u', dist: '12.4km' },
                    { id: 3, name: 'Hazratganj Station', coords: [26.8500, 80.9499], type: 'CCS2 Fast', price: '₹18/u', dist: '14.2km' },
                    { id: 4, name: 'Lulu Mall Node', coords: [26.7725, 81.0003], type: 'Type 2', price: '₹15/u', dist: '18.1km' }
                ],
                init() {
                    // Initialize Map centered on SRMU
                    this.map = L.map('map', { 
                        zoomControl: false,
                        attributionControl: false 
                    }).setView([26.9516, 81.0981], 15);
                    
                    // Dark Mode Map Tiles (CartoDB)
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                        maxZoom: 19
                    }).addTo(this.map);

                    // Render Markers
                    this.chargers.forEach(c => {
                        const markerColor = c.isHQ ? '#f59e0b' : '#22c55e'; // Gold for SRMU, Green for others
                        const hqClass = c.isHQ ? 'hq-pulse' : '';
                        
                        const icon = L.divIcon({
                            className: 'custom-div-icon',
                            html: `<div class='custom-pin ${hqClass}' style='background:${markerColor}'>
                                      <i class='fas fa-charging-station text-slate-950'></i>
                                   </div>`,
                            iconSize: [34, 34],
                            iconAnchor: [17, 34]
                        });

                        const marker = L.marker(c.coords, { icon: icon }).addTo(this.map);
                        
                        marker.bindPopup(`
                            <div style="color:#020617; min-width:150px;">
                                <b style="font-size:14px; display:block; margin-bottom:4px;">${c.name}</b>
                                <div style="font-size:11px; color:#10b981; font-weight:bold;">${c.type} • ${c.price}</div>
                                <button style="margin-top:10px; width:100%; background:#020617; color:white; border:none; padding:6px; border-radius:6px; font-size:10px; font-weight:bold; cursor:pointer;">
                                    BOOK SLOT
                                </button>
                            </div>
                        `);

                        marker.on('click', () => { this.selectedCharger = c; });
                    });
                },
                zoomTo(charger) {
                    this.selectedCharger = charger;
                    this.map.flyTo(charger.coords, 16, { duration: 1.5 });
                },
                locateMe() {
                    this.map.locate({setView: true, maxZoom: 16});
                    this.map.on('locationfound', (e) => {
                        const userIcon = L.divIcon({
                            className: 'user-pos',
                            html: `<div class="w-4 h-4 bg-blue-500 border-2 border-white rounded-full shadow-lg"></div>`
                        });
                        L.marker(e.latlng, { icon: userIcon }).addTo(this.map).bindPopup("Your Location").openPopup();
                    });
                }
            }
        }
    </script>
</body>
</html>
