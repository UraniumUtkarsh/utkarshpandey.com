<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mitra Portal | EV P2P Showcase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        @keyframes pulse-green {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse-slow { animation: pulse-green 3s infinite; }
    </style>
</head>
<body class="bg-slate-50 font-sans antialiased text-slate-900">

    <div x-data="{ 
        isLoggedIn: false, 
        showModal: false,
        currentTime: '',
        notification: '',
        stats: {
            power: 1240.5,
            time: 450,
            earnings: 12400,
            carbon: 850,
            mitras: 14
        },
        init() {
            // Update Clock
            setInterval(() => {
                const now = new Date();
                this.currentTime = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            }, 1000);

            // Simulate Real-time data drift
            setInterval(() => {
                if(this.isLoggedIn) {
                    this.stats.power = (parseFloat(this.stats.power) + 0.01).toFixed(2);
                }
            }, 3000);

            // Random Notifications
            setInterval(() => {
                if(this.isLoggedIn && !this.notification) {
                    const msgs = ['New User Connected: MH-12-AX', 'Payment Received: ₹142.00', 'Charger Health: 100%', 'Peak Hours Started'];
                    this.notification = msgs[Math.floor(Math.random() * msgs.length)];
                    setTimeout(() => { this.notification = '' }, 4000);
                }
            }, 10000);
        }
    }" x-init="init()">

        <template x-if="!isLoggedIn">
            <div class="min-h-screen flex items-center justify-center bg-gradient-to-tr from-slate-900 via-emerald-900 to-slate-900 px-4">
                <div class="bg-white/10 backdrop-blur-xl border border-white/20 p-8 rounded-3xl shadow-2xl w-full max-w-md text-center">
                    <div class="mb-8">
                        <div class="bg-emerald-500 w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-emerald-500/20 rotate-3">
                            <i class="fas fa-charging-station text-white text-3xl"></i>
                        </div>
                        <h1 class="text-3xl font-extrabold text-white tracking-tight">Mitra Portal</h1>
                        <p class="text-emerald-200/60 mt-2 font-medium">Empower the P2P EV Network</p>
                    </div>
                    <div class="space-y-4">
                        <input type="text" placeholder="Username" class="w-full px-5 py-4 bg-white/5 border border-white/10 rounded-xl text-white placeholder-white/30 focus:ring-2 focus:ring-emerald-500 outline-none transition">
                        <input type="password" placeholder="Password" class="w-full px-5 py-4 bg-white/5 border border-white/10 rounded-xl text-white placeholder-white/30 focus:ring-2 focus:ring-emerald-500 outline-none transition">
                        <button @click="isLoggedIn = true" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-bold py-4 rounded-xl transition duration-300 transform hover:scale-[1.02] active:scale-95 shadow-xl shadow-emerald-500/20">
                            Launch Dashboard
                        </button>
                    </div>
                    <div class="mt-8 flex justify-center gap-4">
                        <span class="text-[10px] text-white/40 uppercase tracking-widest">Secure Access</span>
                        <span class="text-[10px] text-white/40 uppercase tracking-widest">•</span>
                        <span class="text-[10px] text-white/40 uppercase tracking-widest">Utkarshpandey.com</span>
                    </div>
                </div>
            </div>
        </template>

        <template x-if="isLoggedIn">
            <div class="min-h-screen flex flex-col" x-cloak>
                
                <nav class="bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-40">
                    <div class="max-w-7xl mx-auto flex justify-between items-center">
                        <div class="flex items-center gap-6">
                            <div class="flex items-center gap-2">
                                <div class="bg-emerald-600 p-1.5 rounded-lg text-white">
                                    <i class="fas fa-leaf text-sm"></i>
                                </div>
                                <span class="font-black text-xl tracking-tighter text-slate-800">EVP2P <span class="text-emerald-600 italic">MITRA</span></span>
                            </div>
                            <div class="hidden sm:flex items-center gap-2 px-3 py-1 bg-emerald-50 rounded-full border border-emerald-100">
                                <span class="relative flex h-2 w-2">
                                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                    <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                                </span>
                                <span class="text-[10px] font-bold text-emerald-700 uppercase tracking-widest">Live Sync: Active</span>
                            </div>
                        </div>
                        
                        <div class="flex items-center gap-6 text-slate-500">
                            <div class="text-right hidden md:block">
                                <p class="text-[10px] text-slate-400 uppercase font-bold">Network Time (IST)</p>
                                <p class="text-sm font-mono font-bold text-slate-700" x-text="currentTime"></p>
                            </div>
                            <button @click="isLoggedIn = false" class="hover:text-red-500 transition-colors">
                                <i class="fas fa-power-off text-lg"></i>
                            </button>
                        </div>
                    </div>
                </nav>

                <main class="p-6 lg:p-10 max-w-7xl mx-auto w-full">
                    
                    <div x-show="notification" 
                         x-transition:enter="transition ease-out duration-300"
                         x-transition:enter-start="opacity-0 translate-y-4"
                         x-transition:leave="transition ease-in duration-300"
                         x-transition:leave-end="opacity-0 translate-y-4"
                         class="fixed bottom-6 right-6 bg-slate-900 text-white px-6 py-4 rounded-2xl shadow-2xl z-50 flex items-center gap-3 border border-white/10">
                        <i class="fas fa-bell text-emerald-400 animate-bounce"></i>
                        <span class="text-sm font-medium" x-text="notification"></span>
                    </div>

                    <div class="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-6">
                        <div>
                            <h2 class="text-3xl font-black text-slate-800 tracking-tight">Host Dashboard</h2>
                            <p class="text-slate-500 mt-1 font-medium">Monitoring your P2P energy distribution hub.</p>
                        </div>
                        <button @click="showModal = true" class="bg-slate-900 hover:bg-slate-800 text-white px-8 py-4 rounded-2xl shadow-xl flex items-center gap-3 transition transform hover:-translate-y-1 active:scale-95">
                            <i class="fas fa-plus"></i>
                            <span class="font-bold">Add New Charger</span>
                        </button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-6">
                        
                        <div class="bg-slate-900 p-6 rounded-3xl shadow-xl border border-slate-800 text-white xl:col-span-1 md:col-span-2">
                            <div class="flex justify-between items-start mb-4">
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Active Stream</p>
                                <span class="text-[10px] bg-emerald-500/20 text-emerald-400 px-2 py-0.5 rounded-full border border-emerald-500/30">In-Use</span>
                            </div>
                            <h3 class="text-3xl font-black tracking-tighter">7.4 <span class="text-sm font-normal text-slate-500 italic">kW</span></h3>
                            <div class="w-full bg-slate-800 h-1.5 rounded-full mt-6 overflow-hidden">
                                <div class="bg-emerald-500 h-full animate-pulse shadow-[0_0_8px_rgba(16,185,129,0.5)]" style="width: 68%"></div>
                            </div>
                            <p class="mt-4 text-[11px] text-slate-400 flex items-center gap-2 italic">
                                <i class="fas fa-car-side"></i> User: DL-01-EV-4421
                            </p>
                        </div>

                        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Total Consumed</p>
                            <h3 class="text-2xl font-black text-slate-800" x-text="stats.power + ' kWh'"></h3>
                            <div class="mt-4 flex items-center gap-1 text-emerald-600 font-bold text-xs">
                                <i class="fas fa-arrow-up"></i> 12% vs last month
                            </div>
                        </div>

                        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 ring-2 ring-emerald-500/5">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">My Earnings</p>
                            <h3 class="text-2xl font-black text-emerald-600" x-text="'₹' + stats.earnings.toLocaleString()"></h3>
                            <div class="mt-4 text-[10px] text-slate-400 font-medium">Next Payout: Oct 24th</div>
                        </div>

                        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Carbon Saved</p>
                            <h3 class="text-2xl font-black text-slate-800" x-text="stats.carbon + ' kg'"></h3>
                            <div class="mt-4 flex items-center gap-2 text-emerald-700 bg-emerald-50 px-2 py-1 rounded-lg w-fit text-[10px] font-bold">
                                <i class="fas fa-tree"></i> 12 TREES EQUIV.
                            </div>
                        </div>

                        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Mitras Helped</p>
                            <h3 class="text-2xl font-black text-slate-800" x-text="stats.mitras"></h3>
                            <div class="mt-4 text-[10px] text-purple-600 font-bold bg-purple-50 px-2 py-1 rounded-lg w-fit uppercase">Community Rank: #4</div>
                        </div>
                    </div>

                    <div class="mt-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div class="lg:col-span-2 bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                            <div class="flex justify-between items-center mb-8">
                                <h4 class="font-bold text-slate-800">Energy Distribution (7 Days)</h4>
                                <div class="flex gap-2">
                                    <div class="w-3 h-3 bg-emerald-500 rounded-full"></div>
                                    <div class="w-3 h-3 bg-slate-200 rounded-full"></div>
                                </div>
                            </div>
                            <div class="h-48 flex items-end justify-between gap-2">
                                <template x-for="i in [40, 70, 45, 90, 65, 80, 55]">
                                    <div :style="`height: ${i}%`" class="w-full bg-slate-100 rounded-t-lg hover:bg-emerald-500 transition-all cursor-pointer group relative">
                                        <div class="absolute -top-8 left-1/2 -translate-x-1/2 bg-slate-800 text-white text-[10px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition" x-text="i + 'kWh'"></div>
                                    </div>
                                </template>
                            </div>
                        </div>
                        
                        <div class="bg-emerald-600 rounded-3xl p-8 text-white flex flex-col justify-between relative overflow-hidden shadow-xl shadow-emerald-600/20">
                            <i class="fas fa-bolt absolute -right-4 -top-4 text-white/10 text-9xl rotate-12"></i>
                            <div>
                                <h4 class="text-xl font-bold mb-2">Expand Your Reach</h4>
                                <p class="text-emerald-100 text-sm leading-relaxed">Hosts with 2 or more chargers earn 15% more carbon credits per session.</p>
                            </div>
                            <button @click="showModal = true" class="mt-6 bg-white text-emerald-700 font-bold py-3 rounded-xl shadow-lg text-sm">Onboard Second Location</button>
                        </div>
                    </div>
                </main>
            </div>
        </template>

        <div x-show="showModal" 
             x-cloak
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 scale-95"
             class="fixed inset-0 z-[60] flex items-center justify-center p-4">
            
            <div @click="showModal = false" class="absolute inset-0 bg-slate-900/60 backdrop-blur-md"></div>
            
            <div class="relative bg-white rounded-3xl shadow-2xl max-w-lg w-full overflow-hidden border border-white/20">
                <div class="bg-slate-50 px-8 py-6 border-b">
                    <h3 class="text-xl font-bold text-slate-800">Register New Charger</h3>
                    <p class="text-sm text-slate-500">Sync your hardware with the EVP2P network.</p>
                </div>
                <div class="p-8 space-y-5">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Location Identifier</label>
                        <input type="text" placeholder="e.g. Basement P2, Green Towers" class="w-full border-slate-200 border-2 p-4 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Hardware Serial (OCR)</label>
                        <div class="relative">
                            <input type="text" placeholder="EV-XXXX-XXXX" class="w-full border-slate-200 border-2 p-4 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none transition">
                            <i class="fas fa-qrcode absolute right-4 top-4 text-slate-400 text-xl"></i>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Power Cap</label>
                            <select class="w-full border-slate-200 border-2 p-4 rounded-xl outline-none">
                                <option>7.4 kW</option>
                                <option>11 kW</option>
                                <option>22 kW</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Access Type</label>
                            <select class="w-full border-slate-200 border-2 p-4 rounded-xl outline-none">
                                <option>Public</option>
                                <option>Semi-Private</option>
                            </select>
                        </div>
                    </div>
                    <div class="flex gap-4 pt-4">
                        <button @click="showModal = false" class="flex-1 py-4 border-2 border-slate-100 rounded-xl font-bold text-slate-500 hover:bg-slate-50 transition">Cancel</button>
                        <button @click="showModal = false" class="flex-1 py-4 bg-emerald-600 text-white rounded-xl font-bold shadow-lg shadow-emerald-600/20 hover:bg-emerald-500 transition">Complete Onboarding</button>
                    </div>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
